<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Video Generator - Tách Nền & Tạo Video Tự Động</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px;
            max-width: 800px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 16px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            color: #666;
            font-size: 16px;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 15px;
            padding: 50px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f8f9ff;
        }

        .upload-area.active {
            background: #f0f4ff;
            border-color: #764ba2;
        }

        .upload-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #333;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .upload-hint {
            color: #999;
            font-size: 14px;
        }

        input[type="file"] {
            display: none;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .control-group label {
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .control-group select,
        .control-group input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .control-group select:focus,
        .control-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            width: 100%;
            margin-bottom: 10px;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .preview {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 10px;
            text-align: center;
        }

        .preview img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .preview video {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .result {
            margin-top: 20px;
            padding: 20px;
            background: #f0f4ff;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .result.success {
            background: #f0fff4;
            border-left-color: #22c55e;
        }

        .result.error {
            background: #fef2f2;
            border-left-color: #ef4444;
        }

        .result-text {
            color: #333;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .result-link {
            display: inline-block;
            color: white;
            background: #667eea;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .result-link:hover {
            background: #764ba2;
        }

        .loader {
            display: none;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .steps {
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
            font-size: 14px;
            color: #666;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 8px 0;
        }

        .step-icon {
            font-size: 18px;
            width: 25px;
            text-align: center;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px;
            }

            .header h1 {
                font-size: 24px;
            }

            .controls {
                grid-template-columns: 1fr;
            }

            .tabs {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 Product Video Generator</h1>
            <p>Tách nền → Thêm background → Tạo video chuyển động - Tất cả tự động!</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('quick')">⚡ Nhanh</button>
            <button class="tab-btn" onclick="switchTab('advanced')">⚙️ Nâng Cao</button>
        </div>

        <!-- TAB 1: QUICK -->
        <div id="quick" class="tab-content active">
            <div class="upload-area" id="uploadArea1">
                <div class="upload-icon">📸</div>
                <div class="upload-text">Kéo thả ảnh vào đây hoặc click để chọn</div>
                <div class="upload-hint">JPG, PNG (Max 100MB)</div>
                <input type="file" id="fileInput1" accept="image/*">
            </div>

            <button class="btn" id="processBtn">🚀 Xử Lý Nhanh</button>

            <div class="loader" id="loader1"></div>
            <div class="preview" id="preview1" style="display: none;"></div>
            <div class="result" id="result1" style="display: none;"></div>
        </div>

        <!-- TAB 2: ADVANCED -->
        <div id="advanced" class="tab-content">
            <div class="upload-area" id="uploadArea2">
                <div class="upload-icon">📸</div>
                <div class="upload-text">Kéo thả ảnh vào đây hoặc click để chọn</div>
                <div class="upload-hint">JPG, PNG (Max 100MB)</div>
                <input type="file" id="fileInput2" accept="image/*">
            </div>

            <div class="controls">
                <div class="control-group">
                    <label>🎨 Loại Background:</label>
                    <select id="bgType">
                        <option value="white">Trắng</option>
                        <option value="black">Đen</option>
                        <option value="gradient" selected>Gradient</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>🎥 Loại Video:</label>
                    <select id="videoType">
                        <option value="rotate" selected>Xoay 360°</option>
                        <option value="zoom">Zoom In/Out</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>⏱️ Thời lượng (giây):</label>
                    <input type="number" id="duration" value="5" min="2" max="30">
                </div>

                <div class="control-group checkbox-group">
                    <label>✨ Thêm Glow Effect:</label>
                    <input type="checkbox" id="addGlow" checked>
                </div>
            </div>

            <button class="btn" id="processAdvancedBtn">🚀 Xử Lý Nâng Cao</button>

            <div class="loader" id="loader2"></div>
            <div class="preview" id="preview2" style="display: none;"></div>
            <div class="result" id="result2" style="display: none;"></div>
        </div>
    </div>

    <script>
        const API_URL = ""; // Sẽ được replace bởi Render
        
        // ==================== SETUP ====================
        
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('active');
            });
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        // ==================== QUICK TAB ====================

        const uploadArea1 = document.getElementById('uploadArea1');
        const fileInput1 = document.getElementById('fileInput1');
        const processBtn = document.getElementById('processBtn');
        const loader1 = document.getElementById('loader1');
        const preview1 = document.getElementById('preview1');
        const result1 = document.getElementById('result1');
        let selectedFile1 = null;

        setupDragDrop(uploadArea1, fileInput1, (file) => {
            selectedFile1 = file;
            showFileInfo(preview1, file);
        });

        processBtn.addEventListener('click', async () => {
            await processFile(
                selectedFile1,
                fileInput1,
                loader1,
                preview1,
                result1,
                '/full-process?bg_type=gradient&video_type=rotate&video_duration=5&add_glow=true'
            );
        });

        // ==================== ADVANCED TAB ====================

        const uploadArea2 = document.getElementById('uploadArea2');
        const fileInput2 = document.getElementById('fileInput2');
        const processAdvancedBtn = document.getElementById('processAdvancedBtn');
        const loader2 = document.getElementById('loader2');
        const preview2 = document.getElementById('preview2');
        const result2 = document.getElementById('result2');
        let selectedFile2 = null;

        setupDragDrop(uploadArea2, fileInput2, (file) => {
            selectedFile2 = file;
            showFileInfo(preview2, file);
        });

        processAdvancedBtn.addEventListener('click', async () => {
            const bgType = document.getElementById('bgType').value;
            const videoType = document.getElementById('videoType').value;
            const duration = document.getElementById('duration').value;
            const addGlow = document.getElementById('addGlow').checked;

            const endpoint = `/full-process?bg_type=${bgType}&video_type=${videoType}&video_duration=${duration}&add_glow=${addGlow}`;

            await processFile(selectedFile2, fileInput2, loader2, preview2, result2, endpoint);
        });

        // ==================== HELPER FUNCTIONS ====================

        function setupDragDrop(uploadArea, fileInput, onFileSelect) {
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('active');
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('active');
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('active');
                const file = e.dataTransfer.files[0];
                onFileSelect(file);
            });

            uploadArea.addEventListener('click', () => fileInput.click());

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                onFileSelect(file);
            });
        }

        function showFileInfo(preview, file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.style.display = 'block';
                preview.innerHTML = `
                    <p style="color: #666; font-size: 14px; margin-bottom: 10px;">
                        <strong>✅ Ảnh đã chọn:</strong> ${file.name}
                    </p>
                    <img src="${e.target.result}" style="max-height: 250px; border-radius: 8px;">
                `;
            };
            reader.readAsDataURL(file);
        }

        async function processFile(file, fileInput, loader, preview, result, endpoint) {
            if (!file) {
                alert('Vui lòng chọn ảnh!');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            loader.style.display = 'block';
            result.style.display = 'none';

            try {
                const response = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.status === 'success') {
                    showSuccessResult(result, data);
                } else {
                    showErrorResult(result, data.message);
                }
            } catch (error) {
                showErrorResult(result, error.message);
            } finally {
                loader.style.display = 'none';
            }
        }

        function showSuccessResult(resultDiv, data) {
            resultDiv.classList.remove('error');
            resultDiv.classList.add('success');
            resultDiv.style.display = 'block';

            let html = `
                <div style="margin-bottom: 15px;">
                    <p style="color: #22c55e; font-weight: bold; font-size: 16px;">✅ Xử lý thành công!</p>
                    <p class="result-text" style="margin-top: 8px;">${data.message}</p>
                </div>
            `;

            if (data.steps) {
                html += '<div class="steps"><strong>Các bước đã thực hiện:</strong>';
                data.steps.forEach(step => {
                    html += `<div class="step"><span class="step-icon">${step.substring(0, 2)}</span>${step}</div>`;
                });
                html += '</div>';
            }

            html += `<a href="${API_URL}${data.download_url}" download class="result-link">📥 Download Video/Ảnh</a>`;

            resultDiv.innerHTML = html;
        }

        function showErrorResult(resultDiv, message) {
            resultDiv.classList.remove('success');
            resultDiv.classList.add('error');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `
                <p class="result-text" style="color: #ef4444;">
                    <strong>❌ Lỗi:</strong> ${message}
                </p>
            `;
        }

        // Set API URL khi tải trang
        window.addEventListener('load', () => {
            const host = window.location.host;
            const protocol = window.location.protocol;
            window.API_URL = `${protocol}//${host}`;
        });
    </script>
</body>
</html>
